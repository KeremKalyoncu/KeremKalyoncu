name: Metrics

on:
  # Her gün gece yarısı otomatik çalışır
  schedule: [{cron: "0 0 * * *"}]
  # Workflow'u manuel tetiklemek için (Actions sekmesinden "Run workflow")
  workflow_dispatch:
  # README'ye her push yaptığında da çalışsın
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ---- 1. GENEL İSTATİSTİKLER (dil, katkı takvimi, yıldız, habits) ----
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg

          template: classic
          base: header, activity, community, metadata

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          plugin_stars: yes
          plugin_stars_limit: 4

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # ---- 2. ÖNE ÇIKAN PROJELER (repo kartları) ----
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.repos.svg

          template: classic
          base: header, repositories
          config_display: large
